const numToSpanish=(n)=>{
  const u=["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve"];
  const e=["diez","once","doce","trece","catorce","quince"];
  const d=["","","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
  if(n===100) return "Cien";
  if(n<1) return "Cero";
  if(n<=9) return u[n].charAt(0).toUpperCase()+u[n].slice(1);
  if(n<=15) return e[n-10].charAt(0).toUpperCase()+e[n-10].slice(1);
  if(n<=19) return "Dieci"+u[n-10];
  if(n===20) return "Veinte";
  if(n<=29) return "Veinti"+u[n-20];
  const tens=Math.floor(n/10), ones=n%10;
  if(ones===0) return d[tens].charAt(0).toUpperCase()+d[tens].slice(1);
  return d[tens].charAt(0).toUpperCase()+d[tens].slice(1)+" y "+u[ones];
};

const genNumerosData=()=>{

  const shuffled=[...all].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,10).map(n=>[numToSpanish(n),n]);
};

/* ═══════════════════════════════════════════
   DIGIT PAD — build numbers digit by digit 0-9
   ═══════════════════════════════════════════ */
function DigitPad({onConfirm,onClose,maxDigits=3}){
  const [digits,setDigits]=useState("");
  const add=(d)=>{if(digits.length<maxDigits)setDigits(digits+d);};
  const del=()=>setDigits(digits.slice(0,-1));
  const confirm=()=>{if(digits.length>0)onConfirm(parseInt(digits,10));};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.wht,borderRadius:28,padding:"20px 18px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",maxWidth:300,width:"85%"}}>
        <div style={{background:C.lit,borderRadius:16,padding:"14px 16px",marginBottom:14,minHeight:56,display:"flex",alignItems:"center",justifyContent:"center",border:`3px solid ${C.pri}22`}}>
          <span style={{fontFamily:F,fontSize:36,fontWeight:700,color:digits?C.dark:C.dark+"33",letterSpacing:4}}>{digits||"___"}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[1,2,3,4,5,6,7,8,9].map(d=>
            <button key={d} onClick={()=>add(String(d))} style={{height:58,borderRadius:16,border:`3px solid ${C.pri}15`,background:C.lit,fontSize:28,fontWeight:700,fontFamily:F,color:C.dark,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{d}</button>
          )}
          <button onClick={del} style={{height:58,borderRadius:16,border:`3px solid ${C.red}22`,background:"#FFF1F0",fontSize:20,fontWeight:700,fontFamily:F,color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⌫</button>
          <button onClick={()=>add("0")} style={{height:58,borderRadius:16,border:`3px solid ${C.pri}15`,background:C.lit,fontSize:28,fontWeight:700,fontFamily:F,color:C.dark,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>0</button>
          <button onClick={confirm} style={{height:58,borderRadius:16,border:"none",background:digits?`linear-gradient(135deg,${C.acc},${C.blu})`:`${C.dark}15`,fontSize:20,fontWeight:700,fontFamily:F,color:digits?C.wht:C.dark+"44",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✓</button>
        </div>
      </div>
    </div>
  );
}

}

function InBox({value,onClick,correct,wrong,size=60}){
  const bc=correct?C.grn:wrong?C.red:C.pri+"55";

  return <button onClick={onClick} style={{width:size,height:size,borderRadius:14,border:`3px solid ${bc}`,background:bg,fontSize:22,fontWeight:700,fontFamily:F,color:C.dark,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:correct?`0 0 14px ${C.grn}44`:wrong?`0 0 14px ${C.red}44`:"0 3px 8px rgba(0,0,0,0.06)",transition:"all 0.2s"}}>{value!==null&&value!==undefined?value:""}</button>;
}

function BBar({onCheck,onReset}){

function Score({s,t}){return <div style={{textAlign:"center",margin:"14px 0",fontFamily:F,fontSize:18,fontWeight:600,color:C.pri,animation:"fadeIn 0.4s ease"}}>{s} de {t} correctas {s===t?"🏆":""}</div>;}
function Tip({text,color="#6C3CE144"}){
  return <div style={{background:C.wht+"cc",borderRadius:16,padding:"10px 14px",marginBottom:14,border:`2px dashed ${color}`,textAlign:"center"}}>

/* ═══ 1. ANTECESOR Y SUCESOR ═══ */
function Antecesor({onBack}){
  const [data,setData]=useState(genAntecesorData);
  const [ans,setAns]=useState(()=>Array(10).fill(null));
  const [checked,setChecked]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [celeb,setCeleb]=useState(false);
  const [pad,setPad]=useState(null);

  const getC=(d)=>d.type==="menos"?d.n-1:d.n+1;
  const check=()=>{setChecked(true);if(ans.every((a,i)=>a===getC(data[i]))){setConfetti(true);setCeleb(true);setTimeout(()=>setConfetti(false),2500);}};
  const sc=ans.filter((a,i)=>a===getC(data[i])).length;
  const reset=()=>{const nd=genAntecesorData();setData(nd);setAns(Array(10).fill(null));setChecked(false);};

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg},${C.lav},${C.mint})`}}>
    <Confetti show={confetti}/><Celeb show={celeb} onClose={()=>setCeleb(false)}/>
    <Hdr title="⭐ Antecesor y Sucesor" subtitle="Uno menos / Uno más (1 al 100)" onBack={onBack} c1="#8B5CF6" c2={C.sec}/>
    <div style={{padding:"14px 10px 120px"}}>
      <Tip text="Escribe el número que va antes (uno menos) o después (uno más) ⭐"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
        {data.map((d,i)=>{
          const correct=getC(d); const ok=checked&&ans[i]===correct; const bad=checked&&ans[i]!==null&&ans[i]!==correct;
          const isMenos=d.type==="menos";
          return <div key={i} style={{background:C.wht,borderRadius:20,padding:"16px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,boxShadow:"0 4px 16px rgba(0,0,0,0.05)",border:`2px solid ${ok?C.grn:bad?C.red+"66":"transparent"}`}}>
            <div style={{fontFamily:F,fontSize:12,fontWeight:700,color:isMenos?"#E11D48":"#0EA5E9",background:isMenos?"#FFE4E6":"#DBEAFE",borderRadius:10,padding:"4px 12px"}}>{isMenos?"Uno menos ←":"Uno más →"}</div>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              {isMenos&&<InBox value={ans[i]} onClick={()=>setPad(i)} correct={ok} wrong={bad} size={52}/>}
              <div style={{width:56,height:56,background:`linear-gradient(135deg,${C.pri},${C.sec})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,fontFamily:F,color:C.wht,boxShadow:`0 4px 12px ${C.pri}44`}}>{d.n}</div>
              {!isMenos&&<InBox value={ans[i]} onClick={()=>setPad(i)} correct={ok} wrong={bad} size={52}/>}
            </div>
            {ok&&<span style={{fontSize:18}}>⭐</span>}
          </div>;
        })}
      </div>
      {checked&&<Score s={sc} t={10}/>}
    </div>
    {pad!==null&&<DigitPad onConfirm={n=>{const na=[...ans];na[pad]=n;setAns(na);setPad(null);if(checked)setChecked(false);}} onClose={()=>setPad(null)}/>}
    <BBar onCheck={check} onReset={reset}/>
  </div>;
}

/* ═══ 2. RECTA NUMÉRICA ═══ */
function Recta({onBack}){
  const initAns=()=>RECTA_DATA.map(r=>{const len=r.end-r.start+1;return Array.from({length:len},(_,i)=>{const n=r.start+i;return(i===0||i===len-1)?n:null;});});
  const [ans,setAns]=useState(initAns);
  const [checked,setChecked]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [celeb,setCeleb]=useState(false);
  const [pad,setPad]=useState(null);

  const check=()=>{setChecked(true);if(ans.every((row,ri)=>row.every((v,ci)=>v===RECTA_DATA[ri].start+ci))){setConfetti(true);setCeleb(true);setTimeout(()=>setConfetti(false),2500);}};
  const totalBlanks=RECTA_DATA.reduce((s,r)=>s+(r.end-r.start+1-2),0);
  const correctBlanks=ans.reduce((s,row,ri)=>s+row.filter((v,ci)=>ci>0&&ci<row.length-1&&v===RECTA_DATA[ri].start+ci).length,0);

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg},${C.sky},${C.mint})`}}>
    <Confetti show={confetti}/><Celeb show={celeb} onClose={()=>setCeleb(false)}/>
    <Hdr title="🔢 Recta Numérica" subtitle="Completa los números faltantes" onBack={onBack} c1="#3B82F6" c2={C.acc}/>
    <div style={{padding:"14px 10px 120px"}}>
      <Tip text="Completa los números que faltan en cada línea 🔢" color="#3B82F644"/>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {RECTA_DATA.map((r,ri)=>{
          const len=r.end-r.start+1; const allOk=checked&&ans[ri].every((v,ci)=>v===r.start+ci);
          return <div key={ri} style={{background:C.wht,borderRadius:18,padding:"12px 8px",boxShadow:"0 3px 12px rgba(0,0,0,0.05)",border:`2px solid ${allOk?C.grn:"transparent"}`}}>
            <div style={{display:"flex",gap:6,alignItems:"center",justifyContent:"center",flexWrap:"wrap"}}>
              {ans[ri].map((v,ci)=>{
                const isFixed=ci===0||ci===len-1; const expected=r.start+ci;
                const ok2=checked&&v===expected; const bad2=checked&&v!==null&&v!==expected;
                if(isFixed) return <div key={ci} style={{width:48,height:48,borderRadius:12,background:`linear-gradient(135deg,#3B82F6,${C.acc})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,fontFamily:F,color:C.wht}}>{v}</div>;
                return <InBox key={ci} value={v} onClick={()=>setPad({ri,ci})} correct={ok2} wrong={bad2} size={48}/>;
              })}
            </div>
            <div style={{height:4,borderRadius:2,background:`linear-gradient(90deg,#3B82F6,${C.acc})`,marginTop:8,opacity:0.3}}/>
          </div>;
        })}
      </div>
      {checked&&<Score s={correctBlanks} t={totalBlanks}/>}
    </div>
    {pad&&<DigitPad onConfirm={n=>{const na=ans.map(r=>[...r]);na[pad.ri][pad.ci]=n;setAns(na);setPad(null);if(checked)setChecked(false);}} onClose={()=>setPad(null)}/>}
    <BBar onCheck={check} onReset={()=>{setChecked(false);setAns(initAns());}}/>
  </div>;
}

/* ═══ 3. ORDEN (random each reset) ═══ */
function Orden({onBack}){
  const [tab,setTab]=useState("asc");
  const [ascD,setAscD]=useState(genOrdenData);
  const [descD,setDescD]=useState(genOrdenData);
  const data=tab==="asc"?ascD:descD;
  const [ans,setAns]=useState({asc:ascD.map(()=>[]),desc:descD.map(()=>[])});
  const [checked,setChecked]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [celeb,setCeleb]=useState(false);

  const cur=ans[tab]; const setCur=(v)=>setAns({...ans,[tab]:v});
  const getCorrect=(row)=>tab==="asc"?[...row].sort((a,b)=>a-b):[...row].sort((a,b)=>b-a);
  const toggleNum=(ri,num)=>{if(checked)setChecked(false);const na=cur.map(r=>[...r]);const idx=na[ri].indexOf(num);if(idx>=0)na[ri].splice(idx,1);else if(na[ri].length<4)na[ri].push(num);setCur(na);};
  const check=()=>{setChecked(true);if(cur.every((r,i)=>r.length===4&&JSON.stringify(r)===JSON.stringify(getCorrect(data[i])))){setConfetti(true);setCeleb(true);setTimeout(()=>setConfetti(false),2500);}};
  const sc=cur.filter((r,i)=>r.length===4&&JSON.stringify(r)===JSON.stringify(getCorrect(data[i]))).length;
  const isAsc=tab==="asc";
  const reset=()=>{setChecked(false);if(tab==="asc"){const nd=genOrdenData();setAscD(nd);setAns({...ans,asc:nd.map(()=>[])});}else{const nd=genOrdenData();setDescD(nd);setAns({...ans,desc:nd.map(()=>[])});}};

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg},${isAsc?C.mint:C.lav},${isAsc?C.sky:C.pink})`}}>
    <Confetti show={confetti}/><Celeb show={celeb} onClose={()=>setCeleb(false)}/>
    <Hdr title="📊 Orden de Números" subtitle={isAsc?"Ascendente: menor a mayor":"Descendente: mayor a menor"} onBack={onBack} c1={isAsc?"#059669":"#D946EF"} c2={isAsc?C.acc:C.sec}/>
    <div style={{padding:"12px 12px 0",display:"flex",gap:6,justifyContent:"center"}}>
      {[{k:"asc",l:"↑ Ascendente"},{k:"desc",l:"↓ Descendente"}].map(t=>
        <button key={t.k} onClick={()=>{setTab(t.k);setChecked(false);}} style={{flex:1,padding:"10px 8px",borderRadius:14,border:"none",maxWidth:200,background:tab===t.k?C.pri:C.wht,color:tab===t.k?C.wht:C.pri,fontFamily:F,fontSize:14,fontWeight:600,cursor:"pointer"}}>{t.l}</button>
      )}
    </div>
    <div style={{padding:"12px 10px 120px"}}>
      <Tip text={isAsc?"Toca los números en orden de MENOR a MAYOR ↑":"Toca los números en orden de MAYOR a MENOR ↓"} color={isAsc?"#05966944":"#D946EF44"}/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {data.map((row,ri)=>{
          const correct=getCorrect(row); const ok=checked&&cur[ri].length===4&&JSON.stringify(cur[ri])===JSON.stringify(correct);
          const bad=checked&&cur[ri].length===4&&JSON.stringify(cur[ri])!==JSON.stringify(correct);
          return <div key={ri} style={{background:C.wht,borderRadius:20,padding:"14px 10px",boxShadow:"0 3px 12px rgba(0,0,0,0.05)",border:`2px solid ${ok?C.grn:bad?C.red+"66":"transparent"}`}}>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:10,flexWrap:"wrap"}}>
              {row.map((num,ci)=>{const used=cur[ri].includes(num);
                return <button key={ci} onClick={()=>toggleNum(ri,num)} style={{minWidth:60,height:52,borderRadius:14,border:`3px solid ${used?C.pri:C.pri+"22"}`,background:used?C.pri+"18":C.lit,fontFamily:F,fontSize:22,fontWeight:700,color:used?C.pri:C.dark,cursor:"pointer",opacity:used?0.5:1,padding:"0 8px"}}>{num}</button>;
              })}
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
              <span style={{fontFamily:F,fontSize:14,fontWeight:700,color:isAsc?"#059669":"#D946EF"}}>→</span>
              <div style={{display:"flex",gap:6}}>
                {[0,1,2,3].map(si=>{const v=cur[ri][si]??null;const isC=checked&&v!==null&&v===correct[si];const isW=checked&&v!==null&&v!==correct[si];
                  return <div key={si} style={{width:52,height:52,borderRadius:14,border:`3px solid ${isC?C.grn:isW?C.red+"88":C.pri+"33"}`,background:isC?C.grn+"18":isW?C.red+"18":C.lit,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,fontSize:22,fontWeight:700,color:C.dark}}>{v!==null?v:""}</div>;
                })}
              </div>
            </div>
            {ok&&<div style={{textAlign:"center",marginTop:4}}><span style={{fontSize:18}}>⭐</span></div>}
          </div>;
        })}
      </div>
      {checked&&<Score s={sc} t={data.length}/>}
    </div>
    <BBar onCheck={check} onReset={reset}/>
  </div>;
}

/* ═══ 4. SUMAS / RESTAS (place-value columns C/D/U) ═══ */
function Operaciones({onBack,mode}){
  const data=mode==="suma"?SUMAS:RESTAS;
  const [ans,setAns]=useState(()=>data.map(()=>({c:null,d:null,u:null})));
  const [checked,setChecked]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [celeb,setCeleb]=useState(false);
  const [pad,setPad]=useState(null);
  const getR=(i)=>mode==="suma"?data[i][0]+data[i][1]:data[i][0]-data[i][1];
  const getDigits=(n)=>({c:Math.floor(n/100),d:Math.floor((n%100)/10),u:n%10});
  const check=()=>{
    setChecked(true);
    const ok=data.every((_,i)=>{const t=getDigits(getR(i)),a=ans[i];
      const needsC=t.c>0;
      return a.d===t.d&&a.u===t.u&&(needsC?a.c===t.c:true);
    });
    if(ok){setConfetti(true);setCeleb(true);setTimeout(()=>setConfetti(false),2500);}
  };
  const sc=data.filter((_,i)=>{const t=getDigits(getR(i)),a=ans[i];const needsC=t.c>0;return a.d===t.d&&a.u===t.u&&(needsC?a.c===t.c:true);}).length;
  const isSuma=mode==="suma";
  const symColor=isSuma?C.acc:"#E11D48";
  const sym=isSuma?"+":"−";

  // Digit extraction helpers
  const dTens=(n)=>n>=10?Math.floor(n/10):null;
  const dOnes=(n)=>n%10;

  // Cell style for operand digits
  const cellS={width:30,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,fontSize:20,fontWeight:700,color:C.dark};
  const emptyS={...cellS,color:"transparent"};

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg},${isSuma?C.mint:C.pink},${isSuma?C.sky:C.lav})`}}>
    <Confetti show={confetti}/><Celeb show={celeb} onClose={()=>setCeleb(false)}/>
    <Hdr title={isSuma?"➕ Repasemos las Sumas":"➖ Repasemos las Restas"} subtitle={isSuma?"Sumas sin llevar":"Restas sin pedir prestado"} onBack={onBack} c1={isSuma?"#059669":"#E11D48"} c2={isSuma?C.acc:C.ora}/>
    <div style={{padding:"14px 10px 120px"}}>
      <Tip text={isSuma?"Escribe el resultado cifra por cifra: D (decenas) y U (unidades) ➕":"Escribe el resultado cifra por cifra: D (decenas) y U (unidades) ➖"} color={isSuma?"#05966944":"#E11D4844"}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(115px,1fr))",gap:10}}>
        {data.map(([a,b],i)=>{
          const correct=getR(i); const td=getDigits(correct); const ar=ans[i];
          const needsC=td.c>0;
          const okU=checked&&ar.u===td.u; const badU=checked&&ar.u!==null&&ar.u!==td.u;
          const okD=checked&&ar.d===td.d; const badD=checked&&ar.d!==null&&ar.d!==td.d;
          const okC=checked&&(!needsC||ar.c===td.c); const badC=checked&&needsC&&ar.c!==null&&ar.c!==td.c;
          const allOk=okU&&okD&&okC&&checked; const anyBad=(badU||badD||badC)&&checked;

          const aT=dTens(a), aO=dOnes(a);
          const bT=dTens(b), bO=dOnes(b);

          return <div key={i} style={{background:C.wht,borderRadius:18,padding:"10px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:0,boxShadow:"0 3px 12px rgba(0,0,0,0.05)",border:`2px solid ${allOk?C.grn:anyBad?C.red+"66":"transparent"}`}}>
            {/* Row: first operand — columns: [sym placeholder] [tens] [units] */}
            <div style={{display:"grid",gridTemplateColumns:"24px 30px 30px",justifyContent:"center",gap:2}}>
              {/* symbol column empty for first row */}
              <div style={emptyS}/>
              {/* tens */}
              <div style={aT!==null?cellS:emptyS}>{aT!==null?aT:""}</div>
              {/* units */}
              <div style={cellS}>{aO}</div>
            </div>
            {/* Row: symbol + second operand */}
            <div style={{display:"grid",gridTemplateColumns:"24px 30px 30px",justifyContent:"center",gap:2}}>
              <div style={{...cellS,width:24,fontSize:16,fontWeight:700,color:symColor}}>{sym}</div>
              <div style={bT!==null?cellS:emptyS}>{bT!==null?bT:""}</div>
              <div style={cellS}>{bO}</div>
            </div>
            {/* Horizontal line */}
            <div style={{height:2,width:86,background:C.dark+"44",borderRadius:1,margin:"3px 0"}}/>
            {/* Result: C / D / U input boxes */}
            <div style={{display:"flex",gap:4,alignItems:"flex-end",marginTop:2}}>
              {needsC&&<div style={{textAlign:"center"}}>
                <div style={{fontFamily:F,fontSize:9,fontWeight:700,color:C.ora}}>C</div>
                <InBox value={ar.c} onClick={()=>setPad({idx:i,field:"c"})} correct={checked&&okC&&needsC} wrong={badC} size={30}/>
              </div>}
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:F,fontSize:9,fontWeight:700,color:"#EC4899"}}>D</div>
                <InBox value={ar.d} onClick={()=>setPad({idx:i,field:"d"})} correct={okD} wrong={badD} size={30}/>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:F,fontSize:9,fontWeight:700,color:"#0EA5E9"}}>U</div>
                <InBox value={ar.u} onClick={()=>setPad({idx:i,field:"u"})} correct={okU} wrong={badU} size={30}/>
              </div>
            </div>
            {allOk&&<span style={{fontSize:12,marginTop:2}}>⭐</span>}
          </div>;
        })}
      </div>
      {checked&&<Score s={sc} t={data.length}/>}
    </div>
    {pad!==null&&<SingleDigitPad onSelect={n=>{const na=ans.map(x=>({...x}));na[pad.idx][pad.field]=n;setAns(na);setPad(null);if(checked)setChecked(false);}} onClose={()=>setPad(null)}/>}
    <BBar onCheck={check} onReset={()=>{setChecked(false);setAns(data.map(()=>({c:null,d:null,u:null})));}}/>
  </div>;
}

/* ═══ 5. NÚMEROS EN PALABRAS (random 10 of 1-100) ═══ */
function Numeros({onBack}){
  const [data,setData]=useState(genNumerosData);
  const [ans,setAns]=useState(()=>Array(10).fill(null));
  const [checked,setChecked]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [celeb,setCeleb]=useState(false);
  const [pad,setPad]=useState(null);
  const check=()=>{setChecked(true);if(ans.every((a,i)=>a===data[i][1])){setConfetti(true);setCeleb(true);setTimeout(()=>setConfetti(false),2500);}};
  const sc=ans.filter((a,i)=>a===data[i][1]).length;
  const reset=()=>{const nd=genNumerosData();setData(nd);setAns(Array(10).fill(null));setChecked(false);};

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg},${C.lav},${C.pink})`}}>
    <Confetti show={confetti}/><Celeb show={celeb} onClose={()=>setCeleb(false)}/>
    <Hdr title="📝 Practicamos los Números" subtitle="Escribe el número correcto (1-100)" onBack={onBack} c1="#7C3AED" c2="#EC4899"/>
    <div style={{padding:"14px 10px 120px"}}>
      <Tip text="Lee la palabra y forma el número con los dígitos 📝" color="#7C3AED44"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:10}}>
        {data.map(([word,num],i)=>{const ok=checked&&ans[i]===num;const bad=checked&&ans[i]!==null&&ans[i]!==num;
          return <div key={i} style={{background:C.wht,borderRadius:18,padding:"12px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,boxShadow:"0 3px 12px rgba(0,0,0,0.05)",border:`2px solid ${ok?C.grn:bad?C.red+"66":"transparent"}`}}>
            <span style={{fontFamily:F,fontSize:14,fontWeight:600,color:C.dark,flex:1}}>{word}</span>
            <InBox value={ans[i]} onClick={()=>setPad(i)} correct={ok} wrong={bad} size={46}/>
            {ok&&<span style={{fontSize:14}}>⭐</span>}
          </div>;
        })}
      </div>
      {checked&&<Score s={sc} t={10}/>}
    </div>
    {pad!==null&&<DigitPad onConfirm={n=>{const na=[...ans];na[pad]=n;setAns(na);setPad(null);if(checked)setChecked(false);}} onClose={()=>setPad(null)}/>}
    <BBar onCheck={check} onReset={reset}/>
  </div>;
}

/* ═══ 6. PROBLEMAS (build operation + digit pad) ═══ */
function Problemas({onBack}){
  const [ops,setOps]=useState(PROBLEMAS.map(()=>null));
  const [ans,setAns]=useState(PROBLEMAS.map(()=>null));
  const [checked,setChecked]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [celeb,setCeleb]=useState(false);
  const [pad,setPad]=useState(null);

  const check=()=>{setChecked(true);if(ans.every((a,i)=>a===PROBLEMAS[i].ans)&&ops.every((o,i)=>o===PROBLEMAS[i].op)){setConfetti(true);setCeleb(true);setTimeout(()=>setConfetti(false),2500);}};
  const scTotal=PROBLEMAS.filter((_,i)=>ops[i]===PROBLEMAS[i].op&&ans[i]===PROBLEMAS[i].ans).length;

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg},${C.yel}44,${C.mint})`}}>
    <Confetti show={confetti}/><Celeb show={celeb} onClose={()=>setCeleb(false)}/>
    <Hdr title="📖 Problemas" subtitle="Lee, elige la operación y resuelve" onBack={onBack} c1={C.ora} c2="#E11D48"/>
    <div style={{padding:"14px 10px 120px"}}>
      <Tip text="Lee el problema, elige si es suma (+) o resta (−), y escribe el resultado 🧠" color={C.ora+"44"}/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {PROBLEMAS.map((p,i)=>{
          const opOk=checked&&ops[i]===p.op; const opBad=checked&&ops[i]!==null&&ops[i]!==p.op;
          const ansOk=checked&&ans[i]===p.ans; const ansBad=checked&&ans[i]!==null&&ans[i]!==p.ans;
          const allOk=opOk&&ansOk; const anyBad=(opBad||ansBad)&&checked;
          return <div key={i} style={{background:C.wht,borderRadius:20,padding:"16px 14px",boxShadow:"0 4px 16px rgba(0,0,0,0.05)",border:`2px solid ${allOk?C.grn:anyBad?C.red+"66":"transparent"}`}}>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <span style={{fontSize:28}}>{p.emoji}</span>
              <p style={{fontFamily:F,fontSize:15,fontWeight:500,color:C.dark,lineHeight:1.4,flex:1}}>{p.text}</p>
            </div>
            <div style={{background:C.lit,borderRadius:14,padding:"12px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
                <span style={{fontFamily:F,fontSize:24,fontWeight:700,color:C.dark}}>{p.a}</span>
                <div style={{display:"flex",gap:6}}>
                  {["+","−"].map(sym=>{const opVal=sym==="+"?"+":"-";const sel=ops[i]===opVal;const isCorr=checked&&opVal===p.op;
                    return <button key={sym} onClick={()=>{const no=[...ops];no[i]=opVal;setOps(no);if(checked)setChecked(false);}} style={{
                      width:50,height:50,borderRadius:14,border:`3px solid ${isCorr&&checked?C.grn:sel?C.pri:C.pri+"22"}`,
                      background:isCorr&&checked?C.grn+"22":sel?C.pri+"18":C.wht,fontFamily:F,fontSize:26,fontWeight:700,
                      color:isCorr&&checked?C.grn:sel?C.pri:C.dark+"66",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                    }}>{sym}</button>;
                  })}
                </div>
                <span style={{fontFamily:F,fontSize:24,fontWeight:700,color:C.dark}}>{p.b}</span>
                <span style={{fontFamily:F,fontSize:24,fontWeight:700,color:C.dark}}>=</span>
                <InBox value={ans[i]} onClick={()=>setPad(i)} correct={ansOk} wrong={ansBad} size={52}/>
              </div>
              {allOk&&<span style={{fontSize:20}}>⭐</span>}
            </div>
          </div>;
        })}
      </div>
      {checked&&<Score s={scTotal} t={PROBLEMAS.length}/>}
    </div>
    {pad!==null&&<DigitPad onConfirm={n=>{const na=[...ans];na[pad]=n;setAns(na);setPad(null);if(checked)setChecked(false);}} onClose={()=>setPad(null)}/>}
    <BBar onCheck={check} onReset={()=>{setChecked(false);setOps(PROBLEMAS.map(()=>null));setAns(PROBLEMAS.map(()=>null));}}/>
  </div>;
}

/* ═══ MENU ═══ */
const ACTS=[
  {id:"antecesor",emoji:"⭐",title:"Antecesor y Sucesor",desc:"Uno menos / Uno más (1-100)",c1:"#8B5CF6",c2:C.sec},
  {id:"recta",emoji:"🔢",title:"Recta Numérica",desc:"Completa los números faltantes",c1:"#3B82F6",c2:C.acc},
  {id:"orden",emoji:"📊",title:"Orden de Números",desc:"Ascendente y descendente",c1:"#059669",c2:"#D946EF"},
  {id:"suma",emoji:"➕",title:"Repasemos las Sumas",desc:"Sumas sin llevar",c1:"#059669",c2:C.acc},
  {id:"resta",emoji:"➖",title:"Repasemos las Restas",desc:"Restas sin pedir prestado",c1:"#E11D48",c2:C.ora},

  const back=()=>setScr("menu");

  if(scr==="recta") return <Recta onBack={back}/>;
  if(scr==="orden") return <Orden onBack={back}/>;
  if(scr==="suma") return <Operaciones onBack={back} mode="suma"/>;
  if(scr==="resta") return <Operaciones onBack={back} mode="resta"/>;
  if(scr==="numeros") return <Numeros onBack={back}/>;
  if(scr==="problemas") return <Problemas onBack={back}/>;

  return <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${C.bg} 0%,#F0E6FF 40%,#E6F7F4 70%,${C.lit} 100%)`,fontFamily:F}}>

      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
      @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    `}</style>
    <div style={{background:`linear-gradient(135deg,${C.pri},#D946EF,${C.sec})`,padding:"32px 20px 28px",borderRadius:"0 0 36px 36px",boxShadow:`0 10px 40px ${C.pri}33`,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:4}}>🧮</div>
      <h1 style={{fontSize:28,fontWeight:700,color:C.wht,margin:0,textShadow:"0 2px 10px rgba(0,0,0,0.15)"}}>Magic Math</h1>
      <p style={{color:"#ffffffcc",fontSize:14,marginTop:4,fontWeight:500}}>Práctica para el Quiz #2 — Primer Grado</p>
    </div>
    <div style={{padding:"20px 14px 40px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:14}}>
      {ACTS.map((act,i)=>
        <button key={act.id} onClick={()=>setScr(act.id)} style={{background:C.wht,borderRadius:24,padding:"20px 14px",border:`2px solid ${act.c1}15`,cursor:"pointer",boxShadow:"0 6px 24px rgba(0,0,0,0.06)",display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center",animation:`slideUp 0.4s ${i*0.08}s ease both`,transition:"transform 0.2s"}}>
          <div style={{width:60,height:60,borderRadius:18,background:`linear-gradient(135deg,${act.c1},${act.c2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,boxShadow:`0 6px 20px ${act.c1}33`}}>{act.emoji}</div>
          <div style={{fontFamily:F,fontSize:14,fontWeight:700,color:C.dark,lineHeight:1.2}}>{act.title}</div>
